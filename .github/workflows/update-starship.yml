name: Update starship config

on:
  workflow_dispatch:
  repository_dispatch:
    types: [update]

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download starship.toml
        run: |
          curl -fsSL https://raw.githubusercontent.com/vegcom/Starship-Twilite/main/starship.toml -o starship.toml

      - name: Check for changes
        id: changes
        run: |
          git add starship.toml
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git commit -m "chore: sync starship.toml from Starship-Twilite"
          git push
